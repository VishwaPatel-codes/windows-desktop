<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="desktop">
        <div class="background-image">
        </div>
        <div class="icons">
            <div class="My-computer">
                <img src="images/mypc.png" alt="My Computer Icon">
                <p>My Computer</p>
            </div>
            <div class="Notepad">
                <img src="images/notes.png" alt="Notepad Icon">
                <p>Notepad</p>
            </div>
            <div class="Internet-Explorer">
                <img src="images/explorer.png" alt="Internet Explorer Icon">
                <p>Internet Explorer</p>
            </div>
        </div>
        <div class="windows">
            <div class="My-computer-window"></div>
            <div class="Notepad-window"></div>
            <div class="Internet-Explorer-window"></div>
        </div>
        <div class="taskbar">
            <div class="Start-button"></div>
            <div class="Taskbar-icons"></div>
        </div>
    </div>
</body>
</html>
