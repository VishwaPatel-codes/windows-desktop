<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Courgette&family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="desktop">
        <div class="pixel-grid"></div>
        <div class="background-image">
        </div>
        <div class="icons">
            <div class="My-computer" id="computer-icon">
                <img src="images/mypc.png" alt="My Computer Icon">
                <p>My Computer</p>
            </div>
            <div class="Notepad" id="notepad-icon">
                <img src="images/notes.png" alt="Notepad Icon">
                <p>Notepad</p>
            </div>
            <div class="paint" id="paint-icon">
                <img src="images/paint.png" alt="Paint Icon">
                <p>Paint</p>
            </div>
        </div>
        <div class="windows">
            <div class="My-computer-window" id="computer-window">
                <div class="computer-header">
                    GALLERY
                    <button class="close-button" id="close-computer">x</button>
                </div>
                <div class="computer-content">
                    <img class="image1" src="images/image1.png" alt="Image 1">
                    <img class="image2" src="images/image2.png" alt="Image 2">
                    <img class="image3" src="images/image3.png" alt="Image 3">
                </div>
            </div>
            <div class="Notepad-window" id="notepad-window">
                <div class="notepad-header">
                    NOTEPAD
                    <button class="close-button" id="close-notepad">x</button>
                </div>
                <div class="note-form">
                    <input class="note-title" type="text" placeholder="Title">
                    <div class="notepad-content">
                        <textarea placeholder="Type your notes here..."></textarea>
                        <button class="add-note">Add note</button>
                    </div>
                </div>

            </div>
            <div class="paint-window" id="paint-window">
                <div class="paint-header">
                    PAINT
                    <button class="close-button" id="close-paint">x</button>
                </div>
                <div class="paint-content">
                    <div class="paint-sidebar">
                        <p class="paint-title">Colors</p>    
                        <div class="colors">
                            <button class="color" id="red-color" style="background-color: rgb(255, 110, 110);"></button>
                            <button class="color" id="black-color" style="background-color: rgb(34, 34, 34);"></button>
                            <button class="color" id="yellow-color" style="background-color: rgb(252, 255, 98);"></button>
                            <button class="color" id="white-color" style="background-color: rgb(249, 250, 255);"></button>
                            <button class="color" id="green-color" style="background-color: rgb(148, 253, 116);"></button>
                            <button class="color" id="blue-color" style="background-color: rgb(90, 78, 255);"></button>
                            <button class="color" id="pink-color" style="background-color: rgb(255, 78, 152);"></button>
                            <button class="color" id="purple-color" style="background-color: rgb(251, 123, 255);"></button>
                            <button class="color" id="brown-color" style="background-color: rgb(223, 145, 81);"></button>
                            <button class="color" id="orange-color" style="background-color: rgb(255, 188, 87);"></button>
                            <button class="color" id="darkpink-color" style="background-color: rgb(255, 51, 211);"></button>
                            <button class="color" id="cyan-color" style="background-color: rgb(83, 235, 255);"></button>
                        </div>
                    </div>
                    <div class="paint-center">
                        <canvas id="paint-canvas"></canvas>
                    </div>
                    <div class="paint-tools">
                        <p class="tools-title">Tools</p>
                        <div class="tool-box">
                            <button class="tool" id="brush-tool">
                                🎨
                            </button>
                        <p>Brush</p>
                        </div>
                        <div class="tool-box">
                            <button class="tool" id="eraser-tool">
                                🧽
                            </button>
                            <p>Eraser</p>
                        </div>
                        <div class="tool-box">
                            <button class="tool" id="clear-canvas">
                                🗑️
                            </button>
                            <p>Clear</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="taskbar">
            <div >
                <button class="start-button">Start</button>
            </div>
            <div class="taskbar-openedapps">
            </div>
            <div id="clock" class="taskbar-clock">
                    00:00:00
            </div>
        </div>
    </div>

<script>
    document.getElementById("computer-icon").onclick = function() {
        document.getElementById("computer-window").style.display = "block";
    };
    document.getElementById("notepad-icon").onclick = function() {
        document.getElementById("notepad-window").style.display = "block";
    };
    document.getElementById("paint-icon").onclick = function() {
        document.getElementById("paint-window").style.display = "block";
    };
    document.getElementById("close-computer").onclick = function() {
        document.getElementById("computer-window").style.display = "none";
    };
    document.getElementById("close-notepad").onclick = function() {
        document.getElementById("notepad-window").style.display = "none";
    };
    document.getElementById("close-paint").onclick = function() {
        document.getElementById("paint-window").style.display = "none";
    };
    function updateClock() {
        const now = new Date();

        let hours = now.getHours();
        let minutes = now.getMinutes();

        const ampm = hours >= 12 ? "PM" : "AM";

        hours = hours % 12;
        if (hours === 0) hours = 12;

        minutes = minutes.toString().padStart(2, "0");

        document.getElementById("clock").textContent =
            `${hours}:${minutes} ${ampm}`;
    }

    updateClock();
    setInterval(updateClock, 1000);


const windows = document.querySelectorAll(
  ".My-computer-window, .Notepad-window, .paint-window"
);
windows.forEach(windowEl => {
  let isDragging = false;
  let offsetX = 0;
  let offsetY = 0;

  windowEl.addEventListener("mousedown", e => {
    if (windowEl.id === "paint-window") {
        const insideCanvas = e.target.closest("#paint-canvas");

        if (insideCanvas) {
            return;
        }
    }
    isDragging = true;
    offsetX = e.clientX - windowEl.offsetLeft;
    offsetY = e.clientY - windowEl.offsetTop;
  });

  document.addEventListener("mousemove", e => {
    if (!isDragging) return;

    windowEl.style.left = e.clientX - offsetX + "px";
    windowEl.style.top = e.clientY - offsetY + "px";
  });

  document.addEventListener("mouseup", () => {
    isDragging = false;
  });
});
const canvas = document.getElementById("paint-canvas");
const ctx = canvas.getContext("2d");

canvas.width = 350;
canvas.height = 350;

let draw = false;
let color = "#ff5c5c";
let tool = "brush";

document.querySelectorAll(".color")[0].onclick = function () {
    color = "#ff5c5c";
};

document.querySelectorAll(".color")[1].onclick = function () {
    color = "#222222";
};

document.querySelectorAll(".color")[2].onclick = function () {
    color = "#fcff62";
};

document.querySelectorAll(".color")[3].onclick = function () {
    color = "#ffffff";
};

document.querySelectorAll(".color")[4].onclick = function () {
    color = "#94fd74";
};

document.querySelectorAll(".color")[5].onclick = function () {
    color = "#5a4eff";
};

document.querySelectorAll(".color")[6].onclick = function () {
    color = "#ff4e98";
};

document.querySelectorAll(".color")[7].onclick = function () {
    color = "#fb7bff";
};

document.querySelectorAll(".color")[8].onclick = function () {
    color = "#df9151";
};

document.querySelectorAll(".color")[9].onclick = function () {
    color = "#ffbc57";
};

document.querySelectorAll(".color")[10].onclick = function () {
    color = "#ff33d3";
};

document.querySelectorAll(".color")[11].onclick = function () {
    color = "#53ebff";
};

document.getElementById("brush-tool").onclick = function () {
    tool = "brush";
};

document.getElementById("eraser-tool").onclick = function () {
    tool = "eraser";
};

document.getElementById("clear-canvas").onclick = function () {
    ctx.clearRect(0, 0, 350, 350);
};

canvas.onmousedown = function () {
    draw = true;
};

canvas.onmouseup = function () {
    draw = false;
};

canvas.onmouseleave = function () {
    draw = false;
};

canvas.onmousemove = function (e) {
    if (!draw) return;

    let x = e.offsetX;
    let y = e.offsetY;

    x = Math.floor(x / 10) * 10;
    y = Math.floor(y / 10) * 10;

    if (tool == "brush") {
        ctx.fillStyle = color;
        ctx.fillRect(x, y, 10, 10);
    }

    if (tool == "eraser") {
        ctx.clearRect(x, y, 10, 10);
    }
};
</script>
</body>
</html>
