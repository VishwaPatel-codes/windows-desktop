<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="desktop">
        <div class="background-image">
        </div>
        <div class="icons">
            <div class="My-computer">
                <img src="images/mypc.png" alt="My Computer Icon">
                <p>My Computer</p>
            </div>
            <div class="Notepad">
                <img src="images/notes.png" alt="Notepad Icon">
                <p>Notepad</p>
            </div>
            <div class="paint">
                <img src="images/paint.png" alt="Paint Icon">
                <p>Paint</p>
            </div>
        </div>
        <div class="windows">
            <div class="My-computer-window">
                <div class="computer-header">GALLERY</div>
                <div class="computer-content">
                    <img class="image1" src="images/image1.png" alt="Image 1">
                    <img class="image2" src="images/image2.png" alt="Image 2">
                    <img class="image3" src="images/image3.png" alt="Image 3">
                </div>
            </div>
            <div class="Notepad-window">
                <div class="notepad-header">NOTEPAD</div>
                <div class="notepad-content">
                    <textarea placeholder="Type your notes here..."></textarea>
                </div>
            </div>
            <div class="paint-window">
                <div class="paint-header">PAINT</div>
                <div class="paint-content">
                    <canvas id="paint-canvas"></canvas>
                </div>
            </div>
        </div>
        <div class="taskbar">
            <div >
                <button class="start-button">Start</button>
            </div>
            <div class="taskbar-openedapps">
            </div>
            <div class="taskbar-clock">
                <p id="clock">
                    12:00 PM
                </p>
            </div>
        </div>
    </div>
</body>
</html>
