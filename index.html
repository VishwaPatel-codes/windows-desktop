<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows</title>
</head>
<body>
    <div class="desktop">
        <div class="background-image">
        </div>
        <div class="icons">
            <div class="My-computer"></div>
            <div class="Notepad"></div>
            <div class="Internet-Explorer"></div>
        </div>
        <div class="windows">
            <div class="My-computer-window"></div>
            <div class="Notepad-window"></div>
            <div class="Internet-Explorer-window"></div>
        </div>
        <div class="taskbar">
            <div class="Start-button"></div>
            <div class="Taskbar-icons"></div>
        </div>
    </div>
</body>
</html>
